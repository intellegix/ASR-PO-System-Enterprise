services:
  - type: web
    name: asr-po-system
    runtime: node
    plan: starter
    region: oregon

    # Build from the web directory
    buildCommand: cd web && npm install && npx prisma generate && npm run build

    # Start from the web directory
    startCommand: cd web && npm start

    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://asr-po-system.render.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: asr-po-database
          property: connectionString
      - key: LOG_LEVEL
        value: info

databases:
  - name: asr-po-database
    databaseName: asr_po_system
    plan: starter
    region: oregon